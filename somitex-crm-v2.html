<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://api.anthropic.com">
  <meta name="description" content="Somitex CRM – Secure Workspace">
  <title>Somitex CRM · Secure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface-2: #181818;
  --border: #232323;
  --border-2: #2e2e2e;
  --text: #f0f0f0;
  --muted: #888888;
  --muted-2: #555555;
  --accent: #f0f0f0;
  --accent-dim: rgba(240,240,240,0.08);
  --danger: #ff4545;
  --warn: #f5a623;
  --ok: #4caf7d;
  --info: #4fa8d5;
  --radius: 12px;
  --radius-sm: 8px;
  --sidebar-w: 248px;
  --topbar-h: 68px;
  --font: 'Manrope', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --shadow: 0 2px 20px rgba(0,0,0,0.6);
  --shadow-sm: 0 1px 8px rgba(0,0,0,0.4);
  --transition: 0.18s ease;
}
[data-theme="light"] {
  --bg: #f4f4f1;
  --surface: #ffffff;
  --surface-2: #f0efea;
  --border: #e0dfd8;
  --border-2: #d0cfc8;
  --text: #0f0f0f;
  --muted: #6a6a6a;
  --muted-2: #9a9a9a;
  --accent: #0f0f0f;
  --accent-dim: rgba(15,15,15,0.06);
  --shadow: 0 2px 20px rgba(0,0,0,0.12);
  --shadow-sm: 0 1px 8px rgba(0,0,0,0.08);
}

/* ─── RESET ───────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; }
body { height:100%; font-family:var(--font); background:var(--bg); color:var(--text); overflow:hidden; font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input,textarea,select { font-family:inherit; color:inherit; background:none; border:none; outline:none; }
a { color:inherit; text-decoration:none; }
table { border-collapse:collapse; width:100%; }
svg { display:block; }
.icon { width:16px; height:16px; stroke:currentColor; stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.icon-lg { width:20px; height:20px; }

/* ─── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:2px; }

/* ─── LOGIN SCREEN ─────────────────────────────────────────── */
#login-screen {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column;
  gap:32px;
}
#login-screen.hidden { display:none; }
.login-brand { display:flex; flex-direction:column; align-items:center; gap:12px; }
.login-brand img { width:48px; height:48px; object-fit:contain; filter:var(--logo-filter, none); }
.login-brand h1 { font-size:20px; font-weight:700; letter-spacing:-0.5px; }
.login-brand p { font-size:12px; color:var(--muted); font-family:var(--mono); }
.login-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px;
  width:320px;
  display:flex; flex-direction:column; gap:20px;
  box-shadow:var(--shadow);
}
.login-title { font-size:15px; font-weight:600; text-align:center; }
.login-subtitle { font-size:12px; color:var(--muted); text-align:center; }
.pin-display {
  display:flex; gap:10px; justify-content:center; align-items:center;
  padding:12px 0;
}
.pin-dot {
  width:12px; height:12px; border-radius:50%;
  border:1.5px solid var(--border-2);
  background:transparent;
  transition:background var(--transition), border-color var(--transition);
}
.pin-dot.filled { background:var(--text); border-color:var(--text); }
.pin-dot.error { background:var(--danger); border-color:var(--danger); animation:shake 0.3s ease; }
.pin-pad {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
}
.pin-key {
  height:48px; border-radius:var(--radius-sm);
  font-size:16px; font-weight:600;
  background:var(--surface-2); border:1px solid var(--border);
  transition:background var(--transition), transform 0.1s;
  display:flex; align-items:center; justify-content:center;
}
.pin-key:hover { background:var(--accent-dim); }
.pin-key:active { transform:scale(0.94); }
.pin-key.del { font-size:13px; color:var(--muted); }
.pin-key.empty { opacity:0; pointer-events:none; }
.login-error { font-size:12px; color:var(--danger); text-align:center; font-family:var(--mono); min-height:16px; }
.login-lockout {
  text-align:center; font-size:12px; color:var(--warn);
  font-family:var(--mono); padding:8px; background:rgba(245,166,35,0.08);
  border-radius:var(--radius-sm); border:1px solid rgba(245,166,35,0.2);
}

/* ─── SHELL ───────────────────────────────────────────────── */
#app { height:100%; }
.shell { display:flex; height:100%; }
.shell.is-locked #content-area { filter:blur(8px) brightness(0.4); pointer-events:none; }

/* ─── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  height:100%; overflow:hidden;
  transition:width var(--transition);
}
.sidebar.collapsed { width:60px; }
.sidebar__top {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px; border-bottom:1px solid var(--border);
  gap:8px; min-height:var(--topbar-h);
}
.brand { display:flex; align-items:center; gap:10px; overflow:hidden; }
.brand-logo { width:28px; height:28px; object-fit:contain; flex-shrink:0; }
.brand-text { overflow:hidden; }
.brand-text strong { display:block; font-size:13px; font-weight:700; white-space:nowrap; }
.brand-text span { display:block; font-size:10px; color:var(--muted); font-family:var(--mono); white-space:nowrap; }
.sidebar.collapsed .brand-text,
.sidebar.collapsed .nav-copy,
.sidebar.collapsed .sidebar-section-label,
.sidebar.collapsed .plan-card { display:none; }
.sidebar__nav { flex:1; overflow-y:auto; padding:8px; }
.sidebar-section { padding:12px 0 4px; }
.sidebar-section-label { font-size:10px; font-weight:600; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.08em; padding:0 8px 6px; }
.nav-list { display:flex; flex-direction:column; gap:1px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:var(--radius-sm);
  cursor:pointer; transition:background var(--transition), color var(--transition);
  width:100%; text-align:left;
}
.nav-item:hover { background:var(--accent-dim); }
.nav-item.active { background:var(--text); color:var(--bg); }
.nav-item.active .muted-text { color:inherit; opacity:0.7; }
.nav-item.security-item.active { background:rgba(76,175,125,0.15); color:var(--ok); }
.nav-item.security-item.active .icon { color:var(--ok); }
.sidebar.collapsed .nav-item { justify-content:center; }
.nav-copy { display:flex; flex-direction:column; overflow:hidden; }
.nav-copy strong { font-size:13px; font-weight:600; white-space:nowrap; }
.nav-copy .muted-text { font-size:10px; color:var(--muted); white-space:nowrap; }
.sidebar__bottom { padding:8px; border-top:1px solid var(--border); }
.plan-card {
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:12px;
}
.plan-card strong { display:block; font-size:12px; margin-bottom:4px; }
.plan-card p { font-size:11px; color:var(--muted); line-height:1.4; }
.security-badge {
  display:flex; align-items:center; gap:6px;
  font-size:10px; color:var(--ok); font-family:var(--mono);
  padding:6px 8px; background:rgba(76,175,125,0.08);
  border-radius:var(--radius-sm); margin-bottom:8px;
  border:1px solid rgba(76,175,125,0.2);
}

/* ─── CONTENT AREA ─────────────────────────────────────────── */
#content-area { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

/* ─── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  height:var(--topbar-h); flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; gap:16px;
}
.topbar__left { display:flex; align-items:center; gap:14px; min-width:0; }
.sidebar-toggle {
  width:32px; height:32px; border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--muted); flex-shrink:0;
  transition:color var(--transition), background var(--transition);
}
.sidebar-toggle:hover { color:var(--text); background:var(--accent-dim); }
.page-title { min-width:0; }
.page-eyebrow { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; font-family:var(--mono); }
.page-title h1 { font-size:18px; font-weight:700; letter-spacing:-0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar__right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; background:var(--accent-dim); border:1px solid var(--border); color:var(--text); }
.chip.ok { background:rgba(76,175,125,0.1); border-color:rgba(76,175,125,0.3); color:var(--ok); }
.chip.warn { background:rgba(245,166,35,0.1); border-color:rgba(245,166,35,0.3); color:var(--warn); }
.chip.danger { background:rgba(255,69,69,0.1); border-color:rgba(255,69,69,0.3); color:var(--danger); }
.chip .dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
.icon-btn {
  width:32px; height:32px; border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--muted); transition:all var(--transition); position:relative;
}
.icon-btn:hover { color:var(--text); background:var(--accent-dim); }
.icon-btn .badge {
  position:absolute; top:-3px; right:-3px;
  width:14px; height:14px; border-radius:50%;
  background:var(--danger); font-size:9px; font-weight:700; color:#fff;
  display:flex; align-items:center; justify-content:center;
}
.theme-btn { position:relative; overflow:hidden; }

/* ─── MAIN ────────────────────────────────────────────────── */
.main { flex:1; overflow-y:auto; padding:24px; }
.page { display:flex; flex-direction:column; gap:20px; max-width:1400px; }

/* ─── GRID ────────────────────────────────────────────────── */
.grid { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
.span-4 { grid-column:span 4; }
.span-5 { grid-column:span 5; }
.span-6 { grid-column:span 6; }
.span-7 { grid-column:span 7; }
.span-8 { grid-column:span 8; }
.span-12 { grid-column:span 12; }

/* ─── PANEL ───────────────────────────────────────────────── */
.panel {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
}
.panel-body { padding:20px; }
.panel-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:16px; }
.panel-title { font-size:14px; font-weight:700; }
.panel-sub { font-size:12px; color:var(--muted); margin-top:2px; }

/* ─── REVEAL ANIMATION ─────────────────────────────────────── */
@keyframes revealUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.reveal { animation:revealUp 0.35s ease forwards; opacity:0; }
.reveal-1 { animation-delay:0.04s; }
.reveal-2 { animation-delay:0.08s; }
.reveal-3 { animation-delay:0.12s; }
.reveal-4 { animation-delay:0.16s; }
.reveal-5 { animation-delay:0.20s; }
.reveal-6 { animation-delay:0.24s; }

/* ─── METRICS ──────────────────────────────────────────────── */
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kpi { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px; }
.kpi-label { font-size:11px; color:var(--muted); font-family:var(--mono); margin-bottom:6px; }
.kpi-value { font-size:24px; font-weight:800; letter-spacing:-0.5px; }
.kpi-change { font-size:11px; color:var(--ok); margin-top:4px; font-family:var(--mono); }
.kpi-change.down { color:var(--danger); }
.mini-stat { padding:10px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:8px; }
.mini-stat:last-child { border-bottom:none; }
.mini-stat-label { font-size:11px; color:var(--muted); }
.mini-stat-value { font-size:13px; font-weight:600; font-family:var(--mono); }

/* ─── HERO PANEL ───────────────────────────────────────────── */
.hero-panel { background:linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%); }
.hero-panel h2 { font-size:22px; font-weight:800; letter-spacing:-0.5px; line-height:1.3; margin:8px 0; }
.hero-panel p { font-size:13px; color:var(--muted); line-height:1.6; }
.hero-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
.hero-metrics { display:flex; gap:16px; margin-top:16px; flex-wrap:wrap; }
.hero-metric { background:var(--accent-dim); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; }
.hero-metric span { display:block; font-size:10px; color:var(--muted); font-family:var(--mono); margin-bottom:3px; }
.hero-metric strong { display:block; font-size:15px; font-weight:700; }

/* ─── CHART ───────────────────────────────────────────────── */
.chart-wrap { height:180px; position:relative; }

/* ─── TABLES ──────────────────────────────────────────────── */
.table-wrap { overflow-x:auto; border-radius:var(--radius-sm); border:1px solid var(--border); }
table { font-size:13px; }
thead { background:var(--surface-2); }
th { padding:10px 14px; text-align:left; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; }
td { padding:10px 14px; border-top:1px solid var(--border); }
tr:hover td { background:var(--accent-dim); }
.table-action { opacity:0; }
tr:hover .table-action,
.mini-stat:hover .table-action,
.table-action:focus-visible { opacity:1; }

/* ─── BUTTONS ──────────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:8px 16px; border-radius:var(--radius-sm);
  font-size:13px; font-weight:600; cursor:pointer;
  transition:all var(--transition); white-space:nowrap;
}
.btn-primary { background:var(--text); color:var(--bg); border:1px solid transparent; }
.btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
.btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--accent-dim); border-color:var(--border-2); }
.btn-danger { background:rgba(255,69,69,0.1); color:var(--danger); border:1px solid rgba(255,69,69,0.3); }
.btn-danger:hover { background:rgba(255,69,69,0.2); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-icon { padding:6px 8px; }

/* ─── CUSTOMERS PAGE ────────────────────────────────────────── */
.customer-layout { display:grid; grid-template-columns:320px 1fr; gap:16px; min-height:600px; }
.search-box {
  display:flex; align-items:center; gap:8px;
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:0 12px; margin-bottom:12px;
}
.search-box:focus-within { border-color:var(--border-2); }
.search-box input { flex:1; padding:9px 0; font-size:13px; background:none; }
.search-box input::placeholder { color:var(--muted); }
.customer-list { display:flex; flex-direction:column; gap:4px; overflow-y:auto; max-height:calc(100vh - 240px); }
.customer-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer;
  border:1px solid transparent; transition:all var(--transition); gap:8px;
}
.customer-row:hover { background:var(--accent-dim); border-color:var(--border); }
.customer-row.active { background:var(--accent-dim); border-color:var(--border-2); }
.customer-row__info { display:flex; align-items:center; gap:10px; min-width:0; }
.avatar { width:34px; height:34px; border-radius:50%; background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; font-family:var(--mono); }
.customer-row strong { font-size:13px; font-weight:600; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.customer-row span { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.field-row { display:flex; flex-direction:column; gap:3px; padding:10px 0; border-bottom:1px solid var(--border); }
.field-row:last-child { border-bottom:none; }
.field-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; font-family:var(--mono); }
.field-value { font-size:13px; font-weight:500; }
.tag-list { display:flex; flex-wrap:wrap; gap:4px; }
.tag { padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; background:var(--accent-dim); border:1px solid var(--border); color:var(--muted); }
.note-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
.note-item { background:var(--surface-2); border-radius:var(--radius-sm); padding:12px; border:1px solid var(--border); }
.note-meta { font-size:10px; color:var(--muted); font-family:var(--mono); margin-bottom:6px; }
.note-body { font-size:13px; line-height:1.5; }
.note-composer { display:flex; flex-direction:column; gap:8px; }
.note-input {
  width:100%; background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 12px; font-size:13px;
  resize:vertical; min-height:72px; line-height:1.5;
  transition:border-color var(--transition);
}
.note-input:focus { border-color:var(--border-2); }

/* ─── PIPELINE ──────────────────────────────────────────────── */
.kanban { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kanban-col { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
.kanban-col-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.kanban-col-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
.kanban-count { font-size:11px; color:var(--muted); font-family:var(--mono); padding:2px 6px; background:var(--border); border-radius:10px; }
.kanban-stack { display:flex; flex-direction:column; gap:8px; min-height:80px; }
.kanban-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:12px; transition:all var(--transition);
}
.kanban-card:hover { border-color:var(--border-2); box-shadow:var(--shadow-sm); }
.kanban-card strong { font-size:13px; font-weight:600; display:block; margin-bottom:4px; }
.kanban-card .card-company { font-size:11px; color:var(--muted); display:block; margin-bottom:8px; }
.kanban-card .card-amount { font-size:13px; font-weight:700; font-family:var(--mono); }
.card-actions { display:flex; gap:4px; margin-top:8px; }

/* ─── CALENDAR ──────────────────────────────────────────────── */
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.cal-head { font-size:11px; font-weight:600; color:var(--muted); text-align:center; padding:6px 0; font-family:var(--mono); }
.cal-cell { min-height:80px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px; position:relative; }
.cal-cell:hover { border-color:var(--border-2); }
.cal-cell.has-event { border-color:rgba(79,168,213,0.4); background:rgba(79,168,213,0.05); }
.cal-date { font-size:12px; font-weight:700; font-family:var(--mono); margin-bottom:6px; }
.cal-event { background:var(--info); border-radius:4px; padding:3px 6px; margin-top:4px; }
.cal-event strong { display:block; font-size:10px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cal-event span { display:block; font-size:9px; color:rgba(255,255,255,0.75); font-family:var(--mono); }

/* ─── TASKS ─────────────────────────────────────────────────── */
.task-list { display:flex; flex-direction:column; gap:6px; }
.task-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); transition:all var(--transition);
}

const APP_KEY = 'smtx-crm-v2';
const chartRefs = {};

/* ─── SECURITY SYSTEM ──────────────────────────────────────── */
const Security = (() => {
  const MAX_ATTEMPTS = 3;
  const LOCKOUT_MS   = 5 * 60 * 1000; // 5 min
  const SESSION_MS   = 20 * 60 * 1000; // 20 min
  let lastActivity   = Date.now();
  let sessionTimer   = null;
  let sessionPct     = 100;
  let auditLog       = [];

  function getStoredHash() {
    return localStorage.getItem('smtx-pin-hash') || hashPin('1234');
  }
  function hashPin(pin) {
    // Simple deterministic hash (in production use bcrypt/argon2)
    let h = 0x811c9dc5;
    for (let i=0; i<pin.length; i++) {
      h ^= pin.charCodeAt(i);
      h = (h * 0x01000193) >>> 0;
    }
    return h.toString(16);
  }
  function verifyPin(pin) { return hashPin(pin) === getStoredHash(); }
  function setPin(pin) { localStorage.setItem('smtx-pin-hash', hashPin(pin)); }

  function getLockout() {
    const d = localStorage.getItem('smtx-lockout');
    return d ? JSON.parse(d) : { attempts:0, lockedUntil:0 };
  }
  function setLockout(data) { localStorage.setItem('smtx-lockout', JSON.stringify(data)); }
  function isLocked() { return getLockout().lockedUntil > Date.now(); }
  function lockoutRemaining() { return Math.max(0, Math.ceil((getLockout().lockedUntil - Date.now())/1000)); }

  function onActivity() { lastActivity = Date.now(); }
  function startSession() {
    clearInterval(sessionTimer);
    lastActivity = Date.now();
    sessionTimer = setInterval(() => {
      const elapsed = Date.now() - lastActivity;
      const remaining = Math.max(0, SESSION_MS - elapsed);
      sessionPct = (remaining / SESSION_MS) * 100;
      const fill = document.getElementById('session-fill');
      if (fill) {
        fill.style.width = sessionPct + '%';
        fill.className = 'session-bar-fill' + (sessionPct < 25 ? ' warn' : '');
      }
      const info = document.getElementById('session-info');
      if (info) {
        const mins = Math.ceil(remaining/60000);
        info.textContent = remaining > 0 ? `Session läuft ab in ${mins} Min.` : 'Sitzung abgelaufen';
      }
      if (remaining <= 0) { logout('Sitzung abgelaufen'); }
    }, 1000);
    addAudit('auth', 'Anmeldung erfolgreich');
  }
  function stopSession() { clearInterval(sessionTimer); }

  function addAudit(type, msg) {
    auditLog.unshift({ type, msg, ts: new Date().toLocaleString('de-DE', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit'}) });
    if (auditLog.length > 100) auditLog.pop();
  }
  function getAuditLog() { return [...auditLog]; }

  function logout(reason='Manuell abgemeldet') {
    stopSession();
    addAudit('auth', reason);
    state.authenticated = false;
    showLogin();
  }

  return { verifyPin, setPin, getLockout, setLockout, isLocked, lockoutRemaining, MAX_ATTEMPTS,
           onActivity, startSession, stopSession, addAudit, getAuditLog, hashPin, logout,
           get sessionPct() { return sessionPct; } };
})();

const state = {
  authenticated: false,
  page: 'dashboard',
  theme: 'dark',
  sidebarCollapsed: false,
  selectedCustomerId: 'c1',
  customerSearch: '',
  draftNote: '',
  notifications: [],
  aiHistory: [],
  data: JSON.parse(JSON.stringify(seedData))

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(APP_KEY));
    if (s) {
      state.theme = s.theme || 'dark';
      state.sidebarCollapsed = !!s.sidebarCollapsed;
      state.page = navItems.some(n=>n.id===s.page) ? s.page : 'dashboard';
      state.selectedCustomerId = s.selectedCustomerId || 'c1';
      if (s.customers && Array.isArray(s.customers)) state.data.customers = s.customers;
      if (s.tasks && Array.isArray(s.tasks)) state.data.tasks = s.tasks;
      if (s.pipeline && Array.isArray(s.pipeline)) state.data.pipeline = s.pipeline;
      if (s.appointments && Array.isArray(s.appointments)) state.data.appointments = s.appointments;
      if (s.aiHistory) state.aiHistory = s.aiHistory;
      if (s.notifications) state.notifications = s.notifications;
    }
  } catch(e) {}
  applyTheme();
}

function saveState() {
  localStorage.setItem(APP_KEY, JSON.stringify({
    theme: state.theme,
    sidebarCollapsed: state.sidebarCollapsed,
    page: state.page,
    selectedCustomerId: state.selectedCustomerId,
    customers: state.data.customers,
    tasks: state.data.tasks,
    pipeline: state.data.pipeline,
    appointments: state.data.appointments,
    aiHistory: state.aiHistory,
    notifications: state.notifications
  }));
}

/* ─── UTILITIES ────────────────────────────────────────────── */
function esc(v) { return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name) { return name.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase(); }
function fmtCur(v) { return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v); }
function fmtDate(v,opts) { return new Intl.DateTimeFormat('de-DE',opts).format(new Date(v)); }
function fmtDT(v) { return new Intl.DateTimeFormat('de-DE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(v)); }
function fmtAppt(a) { return new Intl.DateTimeFormat('de-DE',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(`${a.date}T${a.start}:00`)); }
function customerById(id) { return state.data.customers.find(c=>c.id===id); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  const sun = document.getElementById('theme-icon-sun');
  const moon = document.getElementById('theme-icon-moon');
  if (sun) sun.style.display = state.theme==='dark' ? 'block' : 'none';
  if (moon) moon.style.display = state.theme==='light' ? 'block' : 'none';
}

/* ─── TOAST ────────────────────────────────────────────────── */
function toast(msg, type='ok') {
  const c = document.getElementById('toast-container');
  if (!c) return;
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = type==='ok' ? '✓' : type==='danger' ? '✕' : 'ℹ';
  t.innerHTML = `<span style="font-size:14px;font-weight:700;color:var(--${type})">${icon}</span><span>${esc(msg)}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='all 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

/* ─── NOTIFICATION ─────────────────────────────────────────── */
function addNotification(msg) {
  state.notifications.unshift({ id:uid(), msg, ts:new Date().toISOString(), read:false });
  saveState();
  updateNotifBadge();
}
function updateNotifBadge() {
  const unread = state.notifications.filter(n=>!n.read).length;
  const badge = document.getElementById('notif-badge');
  if (!badge) return;
  badge.style.display = unread > 0 ? 'flex' : 'none';
  badge.textContent = unread;
}

/* ─── LOGIN ────────────────────────────────────────────────── */
let pinEntry = '';

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  pinEntry = '';
  updatePinDisplay();
  document.getElementById('login-error').textContent = '';
  checkLockoutUI();
}
function hideLogin() {
  document.getElementById('login-screen').classList.add('hidden');
}
function checkLockoutUI() {
  const lockout = document.getElementById('login-lockout');
  const pad = document.getElementById('pin-pad');
  if (Security.isLocked()) {
    const secs = Security.lockoutRemaining();
    const mins = Math.floor(secs/60), s = secs%60;
    lockout.style.display = 'block';
    lockout.textContent = `Gesperrt für ${mins}:${s.toString().padStart(2,'0')} – zu viele Fehlversuche`;
    pad.style.opacity = '0.4'; pad.style.pointerEvents = 'none';
    setTimeout(checkLockoutUI, 1000);
  } else {
    lockout.style.display = 'none';
    pad.style.opacity = ''; pad.style.pointerEvents = '';
  }
}
function updatePinDisplay() {
  document.querySelectorAll('.pin-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', i < pinEntry.length);
    dot.classList.remove('error');
  });
}
function pinError() {
  document.querySelectorAll('.pin-dot').forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
  setTimeout(() => { pinEntry=''; updatePinDisplay(); }, 600);
}
function handlePinDigit(digit) {
  if (Security.isLocked()) return;
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updatePinDisplay();
  if (pinEntry.length === 4) {
    setTimeout(() => attemptLogin(), 100);
  }
}
function handlePinDel() {
  pinEntry = pinEntry.slice(0,-1);
  updatePinDisplay();
}
function attemptLogin() {
  const lockout = Security.getLockout();
  if (Security.isLocked()) { pinEntry=''; updatePinDisplay(); return; }
  if (Security.verifyPin(pinEntry)) {
    Security.setLockout({ attempts:0, lockedUntil:0 });
    state.authenticated = true;
    hideLogin();
    Security.startSession();
    Security.addAudit('auth', 'Erfolgreiche Anmeldung');
    renderAll();
    toast('Willkommen! Sitzung gestartet.', 'ok');
  } else {
    const attempts = lockout.attempts + 1;
    const remaining = Security.MAX_ATTEMPTS - attempts;
    if (attempts >= Security.MAX_ATTEMPTS) {
      Security.setLockout({ attempts, lockedUntil: Date.now() + 5*60*1000 });
      Security.addAudit('auth', 'Konto gesperrt – zu viele Fehlversuche');
      document.getElementById('login-error').textContent = 'Konto gesperrt. Bitte 5 Minuten warten.';
      checkLockoutUI();
    } else {
      Security.setLockout({ attempts, lockedUntil:0 });
      document.getElementById('login-error').textContent = `Falscher PIN. Noch ${remaining} Versuch${remaining===1?'':'e'}.`;
    }
    Security.addAudit('auth', `Fehlerhafter PIN-Versuch (${attempts}/${Security.MAX_ATTEMPTS})`);
    pinError();
  }
}

/* ─── SIDEBAR ──────────────────────────────────────────────── */
function renderSidebar() {
  const sb = document.getElementById('sidebar-nav');
  if (!sb) return;
  const collapsed = state.sidebarCollapsed;
  document.getElementById('sidebar').className = 'sidebar' + (collapsed ? ' collapsed' : '');

  sb.innerHTML = navGroups.map(g => `
    <div class="sidebar-section">
      <div class="sidebar-section-label">${esc(g.label)}</div>
      <div class="nav-list">
        ${g.ids.map(id => {
          const item = navItems.find(n=>n.id===id);
          const active = state.page === id;
          return `<button class="nav-item${active?' active':''}${item.special?' '+item.special+'-item':''}" data-nav="${id}" title="${esc(item.label)}">
            ${I(item.icon)}
            <div class="nav-copy">
              <strong>${esc(item.label)}</strong>
              <span class="muted-text">${esc(item.caption)}</span>
            </div>
          </button>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

/* ─── TOPBAR ───────────────────────────────────────────────── */
function renderTopbar() {
  const item = navItems.find(n=>n.id===state.page) || navItems[0];
  const ey = document.getElementById('page-eyebrow');
  const hd = document.getElementById('page-heading');
  if (ey) ey.textContent = item.eyebrow;
  if (hd) hd.textContent = item.label;
}

/* ─── MAIN ROUTER ──────────────────────────────────────────── */
function renderAll() {
  destroyCharts();
  renderSidebar();
  renderTopbar();
  applyTheme();
  updateNotifBadge();

  const mc = document.getElementById('main-content');
  if (!mc) return;
  switch(state.page) {
    case 'dashboard':  mc.innerHTML = renderDashboard(); break;
    case 'customers':  mc.innerHTML = renderCustomers(); hydrateCustomers(); break;
    case 'quotes':     mc.innerHTML = renderQuotes(); break;
    case 'calendar':   mc.innerHTML = renderCalendar(); break;
    case 'pipeline':   mc.innerHTML = renderPipeline(); break;
    case 'templates':  mc.innerHTML = renderTemplates(); break;
    case 'tasks':      mc.innerHTML = renderTasks(); break;
    case 'assistant':  mc.innerHTML = renderAssistant(); hydrateAssistant(); break;
    case 'team':       mc.innerHTML = renderTeam(); break;
    case 'reports':    mc.innerHTML = renderReports(); break;
    case 'api':        mc.innerHTML = renderApi(); break;
    case 'security':   mc.innerHTML = renderSecurity(); break;
    default:           mc.innerHTML = renderDashboard();
  }
  renderCharts();
  addReveal();
}

function addReveal() {
  document.querySelectorAll('.panel, .kpi, .task-item, .kanban-card, .customer-row, .team-card, .template-card, .audit-item').forEach((el,i) => {
    el.classList.add('reveal');
    el.classList.add('reveal-'+ Math.min(6, (i%6)+1));
  });
}

function navigate(page) {
  Security.onActivity();
  state.page = page;
  saveState();
  renderAll();
}

      <div class="span-4">
        <div class="panel" style="height:100%">

/* ─── CUSTOMERS ─────────────────────────────────────────────── */
function getFilteredCustomers() {
  const q = state.customerSearch.toLowerCase();
  if (!q) return [...state.data.customers];
  return state.data.customers.filter(c=>[c.name,c.company,c.email,c.city,c.segment,...c.tags].join(' ').toLowerCase().includes(q));
}

function renderCustomers() {
  const filtered = getFilteredCustomers();
  const sel = filtered.find(c=>c.id===state.selectedCustomerId) || filtered[0];
  return `<div class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" id="export-customers">${I('download')} CSV Export</button>
        <button class="btn btn-primary btn-sm" id="add-customer-btn">${I('plus')} Neuer Kunde</button>
      </div>
    </div>
    <div class="customer-layout">
      <div class="panel">
        <div class="panel-body">
          <div class="panel-header"><div><div class="panel-title">Client Index</div><div class="panel-sub">${filtered.length} Kunden</div></div></div>
          <div class="search-box">${I('search')}<input type="search" id="customer-search" placeholder="Suchen..." value="${esc(state.customerSearch)}"></div>
          <div id="customer-list">${renderCustomerList(filtered, sel)}</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-body" id="customer-detail">${renderCustomerDetail(sel)}</div>
      </div>
    </div>
  </div>`;
}

function renderCustomerList(filtered, sel) {
  if (!filtered.length) return `<div class="empty">Keine Kunden gefunden</div>`;
  return filtered.map(c=>`
    <button class="customer-row${sel&&sel.id===c.id?' active':''}" data-select="${c.id}">
      <div class="customer-row__info">
        <div class="avatar">${initials(c.name)}</div>
        <div style="min-width:0">
          <strong>${esc(c.name)}</strong>
          <span>${esc(c.company)}</span>
        </div>
      </div>
      <span class="chip${c.status==='Aktiv'?' ok':''}" style="font-size:10px">${esc(c.status)}</span>
    </button>
  `).join('');
}

function renderCustomerDetail(c) {
  if (!c) return `<div class="empty">Kunden auswählen</div>`;
  return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px">
      <div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em">Account Detail</div>
        <h2 style="font-size:20px;font-weight:800;letter-spacing:-.3px;margin:4px 0">${esc(c.name)}</h2>
        <p style="font-size:13px;color:var(--muted)">${esc(c.company)} · ${esc(c.segment)} · ${esc(c.city)}</p>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn btn-ghost btn-sm btn-icon" data-edit-customer="${c.id}" title="Bearbeiten">${I('edit')}</button>
        <button class="btn btn-danger btn-sm btn-icon" data-delete-customer="${c.id}" title="Löschen">${I('trash')}</button>
      </div>
    </div>
    <div class="detail-grid">
      <div class="panel" style="background:var(--surface-2)">
        <div class="panel-body">
          <div class="field-row"><div class="field-label">E-Mail</div><div class="field-value mono">${esc(c.email)}</div></div>
          <div class="field-row"><div class="field-label">Telefon</div><div class="field-value mono">${esc(c.phone)}</div></div>
          <div class="field-row"><div class="field-label">Letzter Kontakt</div><div class="field-value">${fmtDT(c.lastContact)}</div></div>
          <div class="field-row" style="border-bottom:none"><div class="field-label">Owner</div><div class="field-value">${esc(c.owner)}</div></div>
        </div>
      </div>
      <div class="panel" style="background:var(--surface-2)">
        <div class="panel-body">
          <div class="field-row"><div class="field-label">Status</div><div class="field-value">${esc(c.status)}</div></div>
          <div class="field-row"><div class="field-label">Segment</div><div class="field-value">${esc(c.segment)}</div></div>
          <div class="field-row"><div class="field-label">Wert</div><div class="field-value mono" style="font-size:16px;font-weight:700">${fmtCur(c.value)}</div></div>
          <div class="field-row" style="border-bottom:none"><div class="field-label">Tags</div><div class="tag-list">${c.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>
        </div>
      </div>
    </div>
    <div class="panel" style="margin-top:12px;background:var(--surface-2)">
      <div class="panel-body">
        <div class="panel-header"><div><div class="panel-title">Notizen</div></div><span style="font-size:12px;color:var(--muted);font-family:var(--mono)">${c.notes.length} Einträge</span></div>
        <div class="note-composer">
          <textarea class="note-input" id="note-draft" placeholder="Neue Notiz für ${esc(c.name)}...">${esc(state.draftNote)}</textarea>
          <button class="btn btn-primary btn-sm" id="save-note-btn">${I('plus')} Notiz speichern</button>
        </div>
        <div class="note-list">
          ${[...c.notes].reverse().map(n=>`
            <div class="note-item">
              <div class="note-meta">${esc(c.owner)} · ${fmtDT(n.createdAt)} · <span class="chip" style="font-size:9px;padding:1px 6px">lokal</span></div>
              <div class="note-body">${esc(n.body)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
}

function hydrateCustomers() {
  const search = document.getElementById('customer-search');
  if (search) search.addEventListener('input', e => { state.customerSearch=e.target.value; refreshCustomerPanels(); });
  const list = document.getElementById('customer-list');
  if (list) list.addEventListener('click', e => {
    const sel = e.target.closest('[data-select]');
    if (sel) { state.selectedCustomerId=sel.dataset.select; state.draftNote=''; saveState(); refreshCustomerPanels(); }
  });
  const detail = document.getElementById('customer-detail');
  if (detail) {
    detail.addEventListener('input', e => { if(e.target.id==='note-draft') state.draftNote=e.target.value; });
    detail.addEventListener('click', e => {
      if(e.target.closest('#save-note-btn')) { saveNote(); return; }
      const editBtn = e.target.closest('[data-edit-customer]');
      if (editBtn) { openEditCustomer(editBtn.dataset.editCustomer); return; }
      const delBtn = e.target.closest('[data-delete-customer]');
      if (delBtn) { openDeleteCustomer(delBtn.dataset.deleteCustomer); }
    });
  }
  const addBtn = document.getElementById('add-customer-btn');
  if (addBtn) addBtn.addEventListener('click', openAddCustomer);
  const exportBtn = document.getElementById('export-customers');
  if (exportBtn) exportBtn.addEventListener('click', exportCustomers);
}

function refreshCustomerPanels() {
  const filtered = getFilteredCustomers();
  const sel = filtered.find(c=>c.id===state.selectedCustomerId) || filtered[0];
  if(sel) state.selectedCustomerId=sel.id;
  const l = document.getElementById('customer-list');
  const d = document.getElementById('customer-detail');
  if(l) l.innerHTML = renderCustomerList(filtered, sel);
  if(d) d.innerHTML = renderCustomerDetail(sel);
  hydrateCustomers();
}

function saveNote() {
  const c = customerById(state.selectedCustomerId);
  const body = state.draftNote.trim();
  if (!c || !body) return;
  c.notes.push({ id:uid(), body, createdAt:new Date().toISOString() });
  Security.addAudit('create', `Notiz hinzugefügt: ${c.name}`);
  state.draftNote='';
  saveState();
  refreshCustomerPanels();
  toast('Notiz gespeichert', 'ok');
}

function exportCustomers() {
  const rows = [['Name','Firma','Email','Telefon','Status','Segment','Stadt','Wert','Owner']];
  state.data.customers.forEach(c=>rows.push([c.name,c.company,c.email,c.phone,c.status,c.segment,c.city,c.value,c.owner]));
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='kunden.csv'; a.click();
  Security.addAudit('update', 'Kundenliste exportiert (CSV)');
  toast('CSV exportiert', 'ok');
}

      <div class="form-group"><label class="form-label">Tags (kommagetrennt)</label><input class="form-input" id="fc-tags" placeholder="VIP, B2B"></div>

function openDeleteCustomer(id) {
  const c = customerById(id);
  if (!c) return;
  showModal('Kunde löschen', `<p style="color:var(--muted)">Möchtest du <strong>${esc(c.name)}</strong> (${esc(c.company)}) wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.</p>`, [
    { label:'Abbrechen', cls:'btn-ghost', action:'close' },
    { label:'Löschen', cls:'btn-danger', action:() => {
      state.data.customers = state.data.customers.filter(x=>x.id!==id);
      if (state.selectedCustomerId===id) state.selectedCustomerId=state.data.customers[0]?.id||'';
      Security.addAudit('delete', `Kunde gelöscht: ${c.name}`);
      saveState(); hideModal(); renderAll();
      toast(`Kunde "${c.name}" gelöscht`, 'info');
    }}
  ]);
}

/* ─── CALENDAR ──────────────────────────────────────────────── */
function renderCalendar() {
  const weekdays = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const today = new Date('2026-04-01T12:00:00');
  const apptMap = {};
  state.data.appointments.forEach(a=>{ apptMap[a.date]=a; });
  let cells='';
  // Start from Monday of current week
  const start = new Date(today);
  const dow = (today.getDay()+6)%7; // 0=Mon
  start.setDate(start.getDate()-dow);

  for(let i=0;i<14;i++) {
    const d=new Date(start); d.setDate(start.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const a=apptMap[iso];
    const isToday=iso==='2026-04-01';
    cells+=`<div class="cal-cell${a?' has-event':''}${isToday?' active':''}">
      <div class="cal-date" style="${isToday?'color:var(--info);font-weight:800':''}">${d.getDate()}</div>
      ${a?`<div class="cal-event"><strong>${esc(a.title)}</strong><span>${esc(a.start)} ${esc(a.location)}</span></div>`:''}
    </div>`;
  }
  return `<div class="page">
    <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
      <button class="btn btn-primary btn-sm" id="add-appt-btn">${I('plus')} Neuer Termin</button>
    </div>
    <div class="panel">
      <div class="panel-body">
        <div class="panel-header"><div class="panel-title">Flow Calendar</div><span class="chip">Apr 2026</span></div>
        <div class="cal-grid">${weekdays.map(d=>`<div class="cal-head">${d}</div>`).join('')}${cells}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-body">
        <div class="panel-title" style="margin-bottom:12px">Alle Termine</div>
        ${state.data.appointments.sort((a,b)=>new Date(`${a.date}T${a.start}`)-new Date(`${b.date}T${b.start}`)).map(a=>`
          <div class="mini-stat">
            <div>
              <div style="font-size:13px;font-weight:600">${esc(a.title)}</div>
              <div style="font-size:11px;color:var(--muted)">${esc(customerById(a.customerId)?.company||'')} · ${esc(a.location)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="mono" style="font-size:11px;color:var(--muted)">${fmtAppt(a)}</span>
              <button class="btn btn-danger btn-sm btn-icon" data-delete-appt="${a.id}" title="Termin löschen">${I('trash')}</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}

function hydrateAssistant() {
  const msgs = document.getElementById('ai-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;

  const input = document.getElementById('ai-input');
  const sendBtn = document.getElementById('ai-send');
  const clearBtn = document.getElementById('clear-chat');

  async function send() {
    const q = input?.value?.trim();
    if (!q) return;
    input.value='';
    state.aiHistory.push({ role:'user', content:q });
    saveState();
    renderAll();
    await sendToAI(q);
  }

  if (input) {
    input.addEventListener('keydown', e => {
      if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  }
  if (sendBtn) sendBtn.addEventListener('click', send);
  if (clearBtn) clearBtn.addEventListener('click', () => { state.aiHistory=[]; saveState(); renderAll(); });

  document.querySelectorAll('[data-quick-ai]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (input) input.value = btn.dataset.quickAi;
      send();
    });
  });
}

async function sendToAI(userMessage) {
  const msgsEl = document.getElementById('ai-messages');
  if (msgsEl) {
    const thinking = document.createElement('div');
    thinking.className='ai-msg assistant';
    thinking.innerHTML='<div class="ai-bubble"><div class="ai-thinking"><div class="dot-pulse"></div><div class="dot-pulse"></div><div class="dot-pulse"></div></div></div>';
    msgsEl.appendChild(thinking);
    msgsEl.scrollTop = msgsEl.scrollHeight;

    try {
      const contextInfo = `Du bist ein CRM-Assistent für Somitex. Aktuelle Kundendaten: ${JSON.stringify(state.data.customers.map(c=>({name:c.name,company:c.company,value:c.value,status:c.status})))}. Pipeline-Wert: ${fmtCur(state.data.pipeline.reduce((s,c)=>s+c.cards.reduce((cs,card)=>cs+card.amount,0),0))}. Antworte auf Deutsch, professionell und präzise.`;
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system: contextInfo,
          messages: [
            ...state.aiHistory.slice(-10,-1).map(m=>({role:m.role,content:m.content})),
            { role:'user', content:userMessage }
          ]
        })
      });
      const data = await resp.json();
      const reply = data.content?.[0]?.text || 'Entschuldigung, ich konnte keine Antwort generieren.';
      thinking.remove();
      state.aiHistory.push({ role:'assistant', content:reply });
      saveState();
      renderAll();
    } catch(e) {
      thinking.remove();
      const errMsg = 'Verbindungsfehler. Bitte stelle sicher, dass die API erreichbar ist.';
      state.aiHistory.push({ role:'assistant', content:errMsg });
      saveState(); renderAll();
    }
  }
}

/* ─── CHARTS ────────────────────────────────────────────────── */
function destroyCharts() {
  Object.values(chartRefs).forEach(c=>c&&typeof c.destroy==='function'&&c.destroy());
  Object.keys(chartRefs).forEach(k=>delete chartRefs[k]);
}

function renderCharts() {
  if (!window.Chart) return;
  const st = getComputedStyle(document.documentElement);
  const text = st.getPropertyValue('--text').trim()||'#f0f0f0';
  const muted = st.getPropertyValue('--muted').trim()||'#888';
  const border = st.getPropertyValue('--border').trim()||'#232323';
  const isLight = state.theme==='light';
  const glow = isLight ? 'rgba(15,15,15,0.1)' : 'rgba(255,255,255,0.12)';

  const baseOpts = (showY=false) => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false}, tooltip:{ displayColors:false, backgroundColor:isLight?'#0f0f0f':'#f0f0f0', titleColor:isLight?'#fff':'#000', bodyColor:isLight?'#fff':'#000', padding:10 } },
    scales:{
      x:{ grid:{display:false}, ticks:{color:muted} },
      y:{ display:showY, grid:{color:border}, ticks:{color:muted, callback:v=>`${Math.round(v/1000)}k`} }
    }
  });

  const revCanvas = document.getElementById('dash-revenue-chart') || document.getElementById('reports-revenue-chart');
  if (revCanvas) {
    chartRefs.rev = new Chart(revCanvas, {
      type:'line',
      data:{ labels:state.data.revenueByMonth.map(e=>e.label), datasets:[{ data:state.data.revenueByMonth.map(e=>e.value), borderColor:text, backgroundColor:glow, borderWidth:2, fill:true, tension:0.42, pointRadius:0, pointHoverRadius:4 }] },
      options:baseOpts(false)
    });
  }
  const mixCanvas = document.getElementById('reports-mix-chart');
  if (mixCanvas) {
    chartRefs.mix = new Chart(mixCanvas, {
      type:'doughnut',
      data:{ labels:state.data.revenueMix.map(e=>e.label), datasets:[{ data:state.data.revenueMix.map(e=>e.value), backgroundColor:isLight?['#0a0a0a','#7b7b7b','#d8d8d8']:['#f0f0f0','#9c9c9c','#505050'], borderWidth:0 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{ legend:{ position:'bottom', labels:{ color:muted, usePointStyle:true, boxWidth:10, padding:16 } } } }
    });
  }
}

/* ─── MODAL SYSTEM ──────────────────────────────────────────── */
function showModal(title, body, buttons=[]) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const footer = document.getElementById('modal-footer');
  footer.innerHTML = '';
  buttons.forEach(btn => {
    const el = document.createElement('button');
    el.className = `btn ${btn.cls||'btn-ghost'}`;
    el.textContent = btn.label;
    if (btn.action==='close') el.addEventListener('click', hideModal);
    else if (typeof btn.action==='function') el.addEventListener('click', btn.action);
    footer.appendChild(el);
  });
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

/* ─── GLOBAL SEARCH ──────────────────────────────────────────── */
function openSearch() {
  document.getElementById('search-overlay').classList.remove('hidden');
  const input = document.getElementById('global-search-input');
  if (input) { input.value=''; input.focus(); renderSearchResults(''); }
}
function closeSearch() {
  document.getElementById('search-overlay').classList.add('hidden');
}
function renderSearchResults(q) {
  const container = document.getElementById('search-results');
  if (!q) { container.innerHTML='<div class="search-empty">Beginne zu tippen...</div>'; return; }
  const ql = q.toLowerCase();
  const results = [];
  state.data.customers.forEach(c => {
    if ([c.name,c.company,c.email].join(' ').toLowerCase().includes(ql))
      results.push({ type:'Kunde', name:c.name, sub:c.company, action:()=>{ navigate('customers'); state.selectedCustomerId=c.id; closeSearch(); renderAll(); } });
  });
  state.data.tasks.forEach(t => {
    if (t.title.toLowerCase().includes(ql))
      results.push({ type:'Task', name:t.title, sub:customerById(t.customerId)?.company||'', action:()=>{ navigate('tasks'); closeSearch(); } });
  });
  state.data.offers.forEach(o => {
    if (o.title.toLowerCase().includes(ql)||o.id.toLowerCase().includes(ql))
      results.push({ type:'Angebot', name:o.title, sub:fmtCur(o.total), action:()=>{ navigate('quotes'); closeSearch(); } });
  });
  if (!results.length) { container.innerHTML='<div class="search-empty">Keine Ergebnisse</div>'; return; }
  container.innerHTML = results.slice(0,8).map((r,i)=>`
    <div class="search-result" data-result="${i}">
      <div class="tag" style="flex-shrink:0;font-size:9px">${esc(r.type)}</div>
      <div><strong>${esc(r.name)}</strong><span>${esc(r.sub)}</span></div>
    </div>
  `).join('');
  container.querySelectorAll('[data-result]').forEach((el,i) => {
    el.addEventListener('click', () => results[i].action());
  });
}

/* ─── EVENT WIRING ──────────────────────────────────────────── */
function wireEvents() {
  // PIN pad
  document.getElementById('pin-pad').addEventListener('click', e => {
    const key = e.target.closest('[data-digit]');
    if (key) handlePinDigit(key.dataset.digit);
  });
  document.getElementById('pin-del').addEventListener('click', handlePinDel);
  document.addEventListener('keydown', e => {
    if (!state.authenticated) {
      if (/^\d$/.test(e.key)) handlePinDigit(e.key);
      if (e.key==='Backspace') handlePinDel();
      return;
    }
    Security.onActivity();
    if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); openSearch(); }
    if (e.key==='Escape') { hideModal(); closeSearch(); }
  });

  // Sidebar toggle
  document.getElementById('sidebar-toggle').addEventListener('click', () => {
    state.sidebarCollapsed = !state.sidebarCollapsed;
    saveState(); renderAll();
  });

  // Theme
  document.getElementById('theme-btn').addEventListener('click', () => {
    state.theme = state.theme==='dark'?'light':'dark';
    saveState(); applyTheme();
    destroyCharts(); renderCharts();
    renderSidebar();
  });

  // Logout
  document.getElementById('logout-btn').addEventListener('click', () => Security.logout());

  // Search
  document.getElementById('search-btn').addEventListener('click', openSearch);
  document.getElementById('search-close').addEventListener('click', closeSearch);
  document.getElementById('search-overlay').addEventListener('click', e => {
    if (e.target.id==='search-overlay') closeSearch();
  });
  document.getElementById('global-search-input').addEventListener('input', e => renderSearchResults(e.target.value));

  // Notifications
  document.getElementById('notif-btn').addEventListener('click', () => {
    const notifs = state.notifications;
    if (!notifs.length) { toast('Keine Benachrichtigungen', 'info'); return; }
    const msgs = notifs.slice(0,5).map(n=>n.msg).join('\n');
    state.notifications.forEach(n=>n.read=true);
    saveState(); updateNotifBadge();
    showModal('Benachrichtigungen', `<div class="code-block" style="white-space:pre-wrap">${esc(msgs)}</div>`, [{label:'Schließen',cls:'btn-ghost',action:'close'}]);
  });

  // Modal close
  document.getElementById('modal-close').addEventListener('click', hideModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target.id==='modal-overlay') hideModal();
  });

  // Main content delegated events
  document.getElementById('main-content').addEventListener('click', e => {
    const delApptBtn = e.target.closest('[data-delete-appt]');
    if (delApptBtn) {
      e.preventDefault();
      e.stopImmediatePropagation();
      const apptId = delApptBtn.dataset.deleteAppt;
      const appt = state.data.appointments.find(x => x.id === apptId);
      if (!appt) return;
      showModal('Termin löschen', `<p style="color:var(--muted)">Möchtest du den Termin "<strong>${esc(appt.title)}</strong>" am <strong>${esc(fmtAppt(appt))}</strong> wirklich löschen?</p>`, [
        { label:'Abbrechen', cls:'btn-ghost', action:'close' },
        { label:'Löschen', cls:'btn-danger', action:() => {
          state.data.appointments = state.data.appointments.filter(x => x.id !== apptId);
          Security.addAudit('delete', `Termin gelöscht: ${appt.title}`);
          saveState(); hideModal(); renderAll(); toast('Termin gelöscht', 'info');
        }}
      ]);
    }
  }, true);

  document.getElementById('main-content').addEventListener('click', e => {
    Security.onActivity();

    // Nav links
    const navBtn = e.target.closest('[data-nav]');
    if (navBtn) { navigate(navBtn.dataset.nav); return; }

    // Jump to customer
    const jumpBtn = e.target.closest('[data-jump]');
    if (jumpBtn) { state.selectedCustomerId=jumpBtn.dataset.jump; navigate('customers'); return; }

    // Toggle task
    const taskToggle = e.target.closest('[data-toggle-task]');
    if (taskToggle) {
      const id = taskToggle.dataset.toggleTask;
      const task = state.data.tasks.find(t=>t.id===id);
      if (task) {
        task.done = !task.done;
        Security.addAudit('update', `Task "${task.title}" ${task.done?'erledigt':'wieder geöffnet'}`);
        saveState(); renderAll(); toast(task.done?'Task erledigt!':'Task wieder geöffnet','ok'); return;
      }
    }

    // Delete task
    const delTask = e.target.closest('[data-delete-task]');
    if (delTask) {
      const id = delTask.dataset.deleteTask;
      const task = state.data.tasks.find(t=>t.id===id);
      if (task) {
        showModal('Task löschen',`<p style="color:var(--muted)">Möchtest du die Aufgabe "<strong>${esc(task.title)}</strong>" löschen?</p>`,[
          {label:'Abbrechen',cls:'btn-ghost',action:'close'},
          {label:'Löschen',cls:'btn-danger',action:()=>{ state.data.tasks=state.data.tasks.filter(t=>t.id!==id); Security.addAudit('delete',`Task gelöscht: ${task.title}`); saveState();hideModal();renderAll(); toast('Task gelöscht','info'); }}
        ]); return;

    // Add task
    if (e.target.closest('#add-task-btn')) {
      showModal('Neue Aufgabe',`

        <div class="form-row">
          <div class="form-group"><label class="form-label">Kunde</label><select class="form-input" id="nt-customer">${state.data.customers.map(c=>`<option value="${c.id}">${esc(c.company)}</option>`).join('')}</select></div>
          <div class="form-group"><label class="form-label">Fälligkeit</label><input class="form-input" id="nt-due" type="date" value="2026-04-10"></div>
        </div>
        <div class="form-group"><label class="form-label">Priorität</label><select class="form-input" id="nt-prio"><option>Hoch</option><option>Mittel</option><option selected>Niedrig</option></select></div>
      `,[
        {label:'Abbrechen',cls:'btn-ghost',action:'close'},
        {label:'Anlegen',cls:'btn-primary',action:()=>{
          const title=document.getElementById('nt-title').value.trim();

    // Move pipeline card

      Security.addAudit('delete',`Deal gelöscht: ${card.title}`);
      saveState(); renderAll(); toast('Deal gelöscht','info'); return;
    }

    if (e.target.closest('#add-deal-btn')) {

        <div class="form-group"><label class="form-label">Titel</label><input class="form-input" id="nd-title" placeholder="Deal-Bezeichnung"></div>

    const copyTpl = e.target.closest('[data-copy-tpl]');
    if (copyTpl) {
      navigator.clipboard?.writeText(copyTpl.dataset.copyTpl);
      toast('Vorlage kopiert','ok'); return;
    }

    // Export report
    if (e.target.closest('#export-report')) {
      Security.addAudit('update','Report exportiert');
      toast('Report-Export wird simuliert','info'); return;
    }

    // Security page actions
    if (e.target.closest('#change-pin-btn')) {
      const cur=document.getElementById('cur-pin')?.value;
      const newP=document.getElementById('new-pin')?.value;
      const rep=document.getElementById('rep-pin')?.value;
      if (!Security.verifyPin(cur)) { toast('Aktueller PIN ist falsch','danger'); return; }
      if (newP.length!==4||!/^\d{4}$/.test(newP)) { toast('Neuer PIN muss 4 Ziffern haben','danger'); return; }
      if (newP!==rep) { toast('PINs stimmen nicht überein','danger'); return; }
      Security.setPin(newP);
      Security.addAudit('update','PIN erfolgreich geändert');
      toast('PIN geändert! Bitte beim nächsten Login verwenden.','ok'); return;
    }
    if (e.target.closest('#reset-lockout-btn')) {
      Security.setLockout({attempts:0,lockedUntil:0});
      Security.addAudit('update','Sperrung manuell zurückgesetzt');
      toast('Sperrung aufgehoben','ok'); renderAll(); return;
    }
    if (e.target.closest('#logout-sec-btn')) { Security.logout(); return; }
    if (e.target.closest('#clear-audit-btn')) {
      Security.getAuditLog().length; // not directly clearable but we can log it
      Security.addAudit('update','Audit-Log wurde angefordert zu leeren (demo)');
      toast('Audit-Log Löschung in Produktion über Admin-Panel','info'); return;
    }
  });

  // Sidebar nav delegation
  document.getElementById('sidebar-nav').addEventListener('click', e => {
    const btn = e.target.closest('[data-nav]');
    if (btn) navigate(btn.dataset.nav);
  });

  document.getElementById('main-content').addEventListener('input', e => {
    Security.onActivity();
  });
}

/* ─── INIT ──────────────────────────────────────────────────── */
function init() {
  loadState();
  wireEvents();
  addNotification('Willkommen! CRM v2.0 mit Cyber Security ist aktiv.');
  addNotification('PIN-Schutz und Session-Timeout sind eingerichtet.');
  showLogin();
}

init();
</script>
</body>
</html>
